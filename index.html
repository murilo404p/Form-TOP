<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form-top</title>
  </head>
  <body>
    <main class="flex">
      <section class="flex flex-col w-[40%] h-screen relative">
        <img src="./src/assets/halie-west-25xggax4bSA-unsplash.jpg" alt="photo" class="h-screen">
        <div class="flex absolute w-full justify-center top-60" id="logo">
          <img src="./src/assets/odin-lined.png" alt="odin-logo" class="w-30">
          <p class="flex items-center text-white text-8xl font-bold" id="odin-name">ODIN</p>
        </div>
      </section>
  
      <section class="flex flex-col w-[60%] h-screen">
        <div class="flex flex-col bg-gray-100 w-full h-96 justify-center gap-10" id="text">
          <p class="text-2xl font-semibold">
            This is not a real online service! You know you need someting <br>like this in your life to help you realize your deepest dreams. <br> Sign up now to ger started.
          </p>
          <p class="text-2xl italic font-semibold">You know you want to.</p>
        </div>

        <div class="flex flex-col w-full shadow-[0_4px_10px_rgba(0,0,0,0.25)]" id="form-container">
          <div>
            <p class="text-3xl">Lets do this!</p>
          </div>
          <form action="" method="get" class="flex gap-6" id="form">
            <div class="flex flex-col gap-10 text-[18px]">
              <div class="flex flex-col">
                <label for="first_name">FIRST NAME: </label>
                <input type="text" id="first_name" placeholder="Mark" name="first_name" class="rounded-[5px] border border-gray-300 ">
              </div>

              <div class="flex flex-col">
                <label for="user_email">EMAIL ADDRESS: </label>
                <input type="email" name="email" id="user_email" placeholder="you@example.com" class="rounded-[5px] border border-gray-300"> 
              </div>

              <div class="flex flex-col">
                <label for="user_password">PASSWORD: </label>
                <input type="password" name="password" id="user_password" class="rounded-[5px] border border-gray-300">
              </div>
            </div>
            
            <div class="flex flex-col gap-10 text-[18px]">
              <div class="flex flex-col">
                <label for="last_name">LAST NAME: </label>
                <input type="text" id="last_name" placeholder="Grayson" name="last_name" class="rounded-[5px] border border-gray-300">
              </div>
  
  
              <div class="flex flex-col">
                <label for="user_number">PHONE NUMBER: </label>
                <input type="number" name="number" id="user_number" class="rounded-[5px] border border-gray-300">
              </div>
  
  
              <div class="flex flex-col">
                <label for="confirm_password">CONFIRM PASSWORD: </label>
                <input type="password" name="passwordConfirm" id="confirm_password" class="rounded-[5px] border border-gray-300">
              </div>
            </div>
          </form>
        </div>

        <div class="bg-gray-100 h-96 w-full flex flex-col gap-6" id="action">
          <button type="submit" class="cursor-pointer rounded-2xl flex flex-col w-[300px] text-white font-bold text-[18px]">Create Account</button>
          <p class="flex text-[17px] gap-2">
            Already have an account? 
            <a href="https://onepiecedle.net/" class="flex text-[#596D48]">Log in</a>
          </p>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>    
  </body>
</html>
