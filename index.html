<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form-top</title>
  </head>
  <body>
    <main>
      <section>
        <img src="./src/assets/halie-west-25xggax4bSA-unsplash.jpg" alt="" class="w-[40%] h-sreen object-cover z-50">
        <div class="bg-gray-500 flex items-center">
          <img src="./src/assets/odin-lined.png" alt="">
          <p>ODIN</p>
        </div>
      </section>
  
      <section>
        <p>  
          <strong>This is not a real online service! You know you need someting like this in your life to help you realize your deepest dreams. Sign up now to ger started. <br>You know you want to.</strong>
        </p>
        <div>
          <h3>Let´s do this!</h3>
          <form action="" method="get">
            <label for="first_name">FIRST NAME: </label>
            <input type="text" id="first_name" placeholder="Mark" name="first_name">

            <label for="last_name">LAST NAME: </label>
            <input type="text" id="last_name" placeholder="Grayson" name="last_name">

            <label for="user_email">EMAIL ADDRESS: </label>
            <input type="email" name="email" id="user_email" placeholder="you@example.com">

            <label for="user_number">PHONE NUMBER: </label>
            <input type="number" name="number" id="user_number">

            <label for="user_password">PASSWORD: </label>
            <input type="password" name="password" id="user_password">

            <label for="confirm_password">CONFIRM PASSWORD: </label>
            <input type="password" name="passwordConfirm" id="confirm_password">
          </form>
        </div>
        <div>
          <button type="submit">Create Account</button>
          <p>Already have an account? Log in</p>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>    
  </body>
</html>
